default:
  tags:
    - docker
  # Image from https://hub.docker.com/_/gcc/ based on Debian
  image: gcc:9

# Make sure commits are GPG signed
ci-fairy:
  stage: test
  script:
    - apt update
    - apt install -y python3-pip git
    - PIP_BREAK_SYSTEM_PACKAGES=1 pip3 install git+https://gitlab.freedesktop.org/freedesktop/ci-templates@7811ba9814a3bad379377241c6c6b62d78b20eac
    - echo Checking commits $CI_FAIRY_BASE_COMMIT..HEAD
    - ci-fairy check-commits --gpg-signed-commit $CI_FAIRY_BASE_COMMIT..HEAD
  tags:
    - 'docker'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        CI_FAIRY_BASE_COMMIT: $CI_MERGE_REQUEST_DIFF_BASE_SHA
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"
      variables:
        CI_FAIRY_BASE_COMMIT: 'HEAD^1'

.autoconf:
  stage: build
  before_script:
    - apt-get update &&
      apt-get install -y libogg-dev valgrind
  script:
    - ./autogen.sh
    - ./configure ${CONFIG_FLAGS}
    - make
    - make check

autoconf:
  extends: .autoconf
  script:
    - ./autogen.sh
    - ./configure ${CONFIG_FLAGS}
    - make
    - make distcheck

fixed-point:
  extends: .autoconf
  variables:
    CONFIG_FLAGS: --enable-fixed-point

no-float:
  extends: .autoconf
  variables:
    CONFIG_FLAGS: --enable-fixed-point --disable-float-api

vorbis-psy:
  extends: .autoconf
  variables:
    CONFIG_FLAGS: --enable-vorbis-psy

valgrind:
  extends: .autoconf
  variables:
    CONFIG_FLAGS: --enable-valgrind

no-binaries:
  extends: .autoconf
  variables:
    CONFIG_FLAGS: --disable-binaries

.meson:
  stage: build
  image: 'debian:bookworm'
  before_script:
    - apt-get update &&
      apt-get install -y libogg-dev ninja-build meson valgrind
  script:
    - meson setup builddir ${CONFIG_FLAGS}
    - ninja -C builddir
    - ninja -C builddir test
    - ninja -C builddir install
    - test $(head -n1 meson.build | awk '/version/ { printf $NF }'  | sed s/[\"\',]//g) = $(awk '/version/ { printf $NF }' library.json | sed s/[\"\',]//g)

meson fixed-point:
  extends: .meson
  variables:
    CONFIG_FLAGS: -Dfixed-point=enabled

meson no-float:
  extends: .meson
  variables:
    CONFIG_FLAGS: -Dfixed-point=enabled -Dfloat-api=disabled

meson vorbis-psy:
  extends: .meson
  variables:
    CONFIG_FLAGS: -Dvorbis-psy=enabled

meson valgrind:
  extends: .meson
  variables:
    CONFIG_FLAGS: -Dvalgrind=enabled

meson no-binaries:
  extends: .meson
  variables:
    CONFIG_FLAGS: -Dtools=disabled -Dtest-binaries=disabled

variables:
  SANITIZER: address
  CFL_PLATFORM: gitlab
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_IN_DOCKER: "true" # may be removed in self-managed GitLab instances
  DOCKER_TLS_CERTDIR: ""

clusterfuzzlite:
  tags:
    - dind
  image:
    name: gcr.io/oss-fuzz-base/clusterfuzzlite-run-fuzzers:v1
    entrypoint: [""]
  services:
    - name: docker:dind # may be removed in self-managed GitLab instances
      command: ["--tls=false"]

  stage: test
  parallel:
    matrix:
      - SANITIZER: [address, undefined, memory]
  rules:
    # Default code change.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        MODE: "code-change"
  before_script:
    # Get GitLab's container id.
    - export CFL_CONTAINER_ID=`docker ps -q -f "label=com.gitlab.gitlab-runner.job.id=$CI_JOB_ID" -f "label=com.gitlab.gitlab-runner.type=build"`
  script:
    # Will build and run the fuzzers.
    - python3 "/opt/oss-fuzz/infra/cifuzz/cifuzz_combined_entrypoint.py"
  artifacts:
    # Upload artifacts when a crash makes the job fail.
    when: always
    paths:
      - artifacts/
